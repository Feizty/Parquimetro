<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquímetro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>

    <header>
        <h1>Parquimetro</h1>
    </header>
    <main>
        <div>
            <table>
                <thead>
                    <th>Valor</th>
                    <th>Tempo</th>
                </thead>
                <tbody>
                    <tr>
                        <td>R$1,00</td>
                        <td>30 minutos</td>
                    </tr>
                    <tr>
                        <td>R$1,75</td>
                        <td>60 minutos</td>
                    </tr>
                    <tr>
                        <td>R$3,00</td>
                        <td>120 minutos (tempo máximo permitido)</td>
                    </tr>
                </tbody>
            </table>
            
            <label for="valor">Valor Depositado</label>
            <input type="number" id="valor" placeholder="Valor de pagamento">

            <input type="button" id="calcular" placeholder="Calcular" value="Calcular" onclick="calcular_tempo()">
            
            <p id="resultado"></p>
        </div>
      
    </main>

    
</body>
</html>
